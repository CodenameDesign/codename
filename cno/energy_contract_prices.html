<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian Energy Contract Prices</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#222;padding:1rem;}
  .charts-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;}
  .chart-title{text-align:center;font-size:13px;font-weight:500;margin:0 0 4px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#666;padding:0.5rem 0 8px;}
  .legend span{display:flex;align-items:center;gap:4px;}
  .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .legend-dash{width:20px;height:2px;border-top:2px dashed #888;display:inline-block;}
  .source{font-size:11px;color:#999;margin:8px 0 0;text-align:left;}
  @media(max-width:520px){.charts-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="legend">
  <span><span class="legend-dot" style="background:#00dca6;"></span>Wind</span>
  <span><span class="legend-dot" style="background:#fa8c00;"></span>Solar</span>
  <span><span class="legend-dot" style="background:#c71e1d;"></span>Nuclear</span>
  <span><span class="legend-dash"></span>Trend</span>
  <span style="color:#999;">Dot size = Contracted Capacity (MW)</span>
  <span style="display:flex;align-items:center;gap:10px;margin-left:4px;">
    <span style="display:flex;align-items:center;gap:4px;">
      <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5" fill="none" stroke="#999" stroke-width="1.5"/></svg>
      <span style="font-size:11px;color:#999;">700</span>
    </span>
    <span style="display:flex;align-items:center;gap:4px;">
      <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" fill="none" stroke="#999" stroke-width="1.5"/></svg>
      <span style="font-size:11px;color:#999;">3,000</span>
    </span>
    <span style="display:flex;align-items:center;gap:4px;">
      <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="#999" stroke-width="1.5"/></svg>
      <span style="font-size:11px;color:#999;">7,000</span>
    </span>
  </span>
</div>

<div class="charts-grid">
  <div>
    <p class="chart-title" style="color:#00dca6;">Wind</p>
    <div style="position:relative;width:100%;height:260px;"><canvas id="windChart"></canvas></div>
  </div>
  <div>
    <p class="chart-title" style="color:#fa8c00;">Solar</p>
    <div style="position:relative;width:100%;height:260px;"><canvas id="solarChart"></canvas></div>
  </div>
  <div>
    <p class="chart-title" style="color:#c71e1d;">Nuclear</p>
    <div style="position:relative;width:100%;height:260px;"><canvas id="nuclearChart"></canvas></div>
  </div>
</div>

<p class="source">Source: Pembina Institute</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const windData=[
  {x:2005,y:161.08,mw:2000,label:'Quebec'},{x:2008,y:136.65,mw:250,label:'Quebec'},
  {x:2009,y:183.57,mw:2511,label:'Ontario'},{x:2010,y:109.47,mw:1168,label:'BC'},
  {x:2011,y:179.36,mw:150,label:'Nova Scotia'},{x:2016,y:109.81,mw:300,label:'Ontario'},
  {x:2017,y:46.56,mw:600,label:'Alberta'},{x:2018,y:47.60,mw:363,label:'Alberta'},
  {x:2018,y:49.39,mw:400,label:'Alberta'},{x:2018,y:51.67,mw:200,label:'Sask'},
  {x:2022,y:56.27,mw:306,label:'Nova Scotia'},{x:2023,y:66.45,mw:262,label:'Nova Scotia'},
  {x:2024,y:75.50,mw:1635,label:'BC'},{x:2024,y:81.48,mw:550,label:'Quebec'},
  {x:2025,y:64.00,mw:200,label:'Sask'},{x:2025,y:72.43,mw:962,label:'Ontario'},
  {x:2026,y:87.25,mw:400,label:'Ontario'}
];
const solarData=[
  {x:2009,y:421.63,mw:1753,label:'Ontario'},{x:2016,y:200.32,mw:140,label:'Ontario'},
  {x:2019,y:57.99,mw:92,label:'Alberta'},{x:2025,y:90.00,mw:100,label:'Sask'},
  {x:2026,y:84.69,mw:915,label:'Ontario'}
];
const nuclearData=[
  {x:2013,y:75.27,mw:660,label:'New Brunswick'},{x:2015,y:97.25,mw:6550,label:'Ontario'},
  {x:2016,y:97.79,mw:3512,label:'Ontario'},{x:2025,y:152.02,mw:1200,label:'Ontario'},
  {x:2025,y:266.29,mw:2100,label:'Ontario'}
];

const allMW = [...windData,...solarData,...nuclearData].map(d=>d.mw);
const minMW = Math.min(...allMW), maxMW = Math.max(...allMW);
const minR = 4, maxR = 20;
function mwToRadius(mw){ return minR + (mw - minMW)/(maxMW - minMW) * (maxR - minR); }

function expTrend(data,xMin,xMax){
  const xs=data.map(d=>d.x),ys=data.map(d=>d.y);
  const lnys=ys.map(y=>Math.log(y));
  const n=xs.length;
  const sx=xs.reduce((a,b)=>a+b,0),sy=lnys.reduce((a,b)=>a+b,0);
  const sxy=xs.reduce((a,x,i)=>a+x*lnys[i],0);
  const sx2=xs.reduce((a,x)=>a+x*x,0);
  const b=(n*sxy-sx*sy)/(n*sx2-sx*sx);
  const a=Math.exp((sy-b*sx)/n);
  const pts=[];
  for(let x=xMin;x<=xMax;x+=0.5) pts.push({x,y:Math.max(0,a*Math.exp(b*x))});
  return pts;
}

const labelPlugin={
  id:'dotLabels',
  afterDatasetsDraw(chart){
    const ctx=chart.ctx;
    const ds=chart.data.datasets[0];
    const meta=chart.getDatasetMeta(0);
    ctx.save();
    ctx.font='500 10px sans-serif';
    meta.data.forEach((el,i)=>{
      const d=ds.data[i];
      if(!d.showLabel) return;
      const r=mwToRadius(d.mw);
      ctx.fillStyle=ds.backgroundColor;
      ctx.textAlign='center';
      ctx.fillText('$'+Math.round(d.y),el.x,el.y-r-4);
    });
    ctx.restore();
  }
};
Chart.register(labelPlugin);

function makeChart(id,dots,trend,color,labelIndices,showAxisLabels){
  const labeledDots=dots.map((d,i)=>({...d,showLabel:labelIndices.includes(i)}));
  new Chart(document.getElementById(id),{
    type:'bubble',
    data:{datasets:[
      {
        type:'bubble',
        data:labeledDots.map(d=>({x:d.x,y:d.y,r:mwToRadius(d.mw),mw:d.mw,label:d.label,showLabel:d.showLabel})),
        backgroundColor:color+'CC',
        borderColor:color,
        borderWidth:1
      },
      {
        type:'line',
        data:trend,
        borderColor:color,
        borderWidth:2,
        borderDash:[6,4],
        pointRadius:0,
        tension:0.4,
        fill:false,
        showLine:true
      }
    ]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>{
              const d=ctx.raw;
              if(d.mw) return `${d.label}: $${Math.round(d.y)}/MWh · ${d.mw} MW`;
              return '$'+Math.round(d.y)+'/MWh';
            }
          }
        }
      },
      scales:{
        x:{
          type:'linear',
          min:2004,
          max:2027,
          ticks:{stepSize:5,font:{size:10},callback:function(v){return String(v);}},
          grid:{color:'rgba(128,128,128,0.1)'},
          title:{display:true,text:showAxisLabels?'Contract Year':' ',font:{size:11},color:showAxisLabels?'#444':'transparent',align:'center'}
        },
        y:{
          min:0,
          max:500,
          ticks:{callback:function(v){return '$'+v;},font:{size:10}},
          grid:{color:'rgba(128,128,128,0.1)'},
          title:{display:showAxisLabels,text:'Contract Price (2025 $C/MWh)',font:{size:11},color:'#444'}
        }
      }
    }
  });
}

makeChart('windChart',windData,expTrend(windData,2004,2027),'#00dca6',[windData.length-1,windData.length-2],true);
makeChart('solarChart',solarData,expTrend(solarData,2004,2027),'#fa8c00',[solarData.length-1,solarData.length-2],false);
makeChart('nuclearChart',nuclearData,expTrend(nuclearData,2004,2027),'#c71e1d',[nuclearData.length-1,nuclearData.length-2],false);
</script>
</body>
</html>
