<svg width="100%" viewBox="0 0 680 430" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated plant being watered</title>
<desc>A green plant illustration with gentle breathing and swaying animations</desc>

<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="groundGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#28ca29" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#28ca29" stop-opacity="0"/>
  </radialGradient>
  <style>
    .plant-main  { transform-origin: 87px 360px;  animation: sway 4s ease-in-out infinite; }
    .plant-right { transform-origin: 390px 200px; animation: sway-right 5s ease-in-out infinite; }
    .leaf-l1 { transform-origin: 40px 110px;  animation: leaf-pulse   3s ease-in-out infinite 0.2s; }
    .leaf-l2 { transform-origin: 40px 143px;  animation: leaf-pulse   3s ease-in-out infinite 0.5s; }
    .leaf-l3 { transform-origin: 40px  77px;  animation: leaf-pulse   3s ease-in-out infinite 0.8s; }
    .leaf-r1 { transform-origin: 150px 143px; animation: leaf-pulse-r 3s ease-in-out infinite 0.3s; }
    .leaf-r2 { transform-origin: 150px  71px; animation: leaf-pulse-r 3s ease-in-out infinite 0.6s; }
    .leaf-r3 { transform-origin: 150px 110px; animation: leaf-pulse-r 3s ease-in-out infinite 1.0s; }
    .vine-tips    { transform-origin: 300px 282px; animation: vine-grow  6s ease-in-out infinite; }
    .glow-ellipse { animation: glow-pulse 4s ease-in-out infinite; }

    @keyframes sway {
      0%,100% { transform: rotate(0deg); }
      25%  { transform: rotate(1.2deg); }
      75%  { transform: rotate(-1.2deg); }
    }
    @keyframes sway-right {
      0%,100% { transform: rotate(0deg); }
      30%  { transform: rotate(-1.5deg); }
      70%  { transform: rotate(1.5deg); }
    }
    @keyframes leaf-pulse {
      0%,100% { transform: scaleX(1) rotate(0deg); }
      50%  { transform: scaleX(1.06) rotate(-1deg); }
    }
    @keyframes leaf-pulse-r {
      0%,100% { transform: scaleX(1) rotate(0deg); }
      50%  { transform: scaleX(1.06) rotate(1deg); }
    }
    @keyframes vine-grow {
      0%,100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.03); opacity: 0.85; }
    }
    @keyframes glow-pulse {
      0%,100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    .w1 { animation: stream-a 1.4s ease-in infinite 0.00s; }
    .w2 { animation: stream-b 1.4s ease-in infinite 0.35s; }
    .w3 { animation: stream-c 1.4s ease-in infinite 0.70s; }
    .w4 { animation: stream-d 1.4s ease-in infinite 1.05s; }

    @keyframes stream-a {
      0%   { opacity:0; transform: translate(0,0); }
      15%  { opacity:1; }
      70%  { opacity:0.7; transform: translate(-28px, 38px); }
      100% { opacity:0;   transform: translate(-40px, 55px); }
    }
    @keyframes stream-b {
      0%   { opacity:0; transform: translate(0,0); }
      15%  { opacity:1; }
      70%  { opacity:0.7; transform: translate(-32px, 28px); }
      100% { opacity:0;   transform: translate(-46px, 40px); }
    }
    @keyframes stream-c {
      0%   { opacity:0; transform: translate(0,0); }
      15%  { opacity:1; }
      70%  { opacity:0.7; transform: translate(-30px, 22px); }
      100% { opacity:0;   transform: translate(-44px, 32px); }
    }
    @keyframes stream-d {
      0%   { opacity:0; transform: translate(0,0); }
      15%  { opacity:1; }
      70%  { opacity:0.7; transform: translate(-26px, 35px); }
      100% { opacity:0;   transform: translate(-38px, 50px); }
    }
  </style>
</defs>

<ellipse class="glow-ellipse" cx="245" cy="390" rx="200" ry="30" fill="url(#groundGlow)"/>

